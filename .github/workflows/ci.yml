name: AT-Infrastructure CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    name: Lint & Format Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 bandit

      - name: Check code formatting with Black
        run: black --check --line-length 88 .

      - name: Lint with Flake8
        run: flake8 --max-line-length=88 --extend-ignore=E203,W503 .

      - name: Security scan with Bandit
        run: bandit -r . -q

  test-all:
    runs-on: ubuntu-latest
    name: Test All (Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        run: pytest -v --cov --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    name: Security & Compliance Scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r . -q

      - name: Check dependencies for vulnerabilities
        run: pip install safety && safety check --json

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Analysis (Advisory)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install radon

      - name: Generate code metrics
        continue-on-error: true  # Advisory only — does not block deployment
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc . -a || true
          echo ""
          echo "=== Maintainability Index ==="
          radon mi . || true

  documentation:
    runs-on: ubuntu-latest
    name: Documentation Validation

    steps:
      - uses: actions/checkout@v4

      - name: Check required documentation
        run: |
          required_files=("README.md" "LICENSE")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required documentation: $file"
              exit 1
            fi
          done
          echo "✓ All required documentation present"

      - name: Validate markdown syntax
        continue-on-error: true  # Advisory only
        run: |
          python -c "import markdown; markdown.markdown(open('README.md').read())" && echo "✓ Markdown valid" || echo "⚠ Markdown check skipped"
