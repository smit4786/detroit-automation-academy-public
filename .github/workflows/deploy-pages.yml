name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: blog-source
        run: npm install

      - name: Build with Hugo
        working-directory: blog-source
        run: |
          echo "Building Hugo site..."
          export PATH=$PWD/node_modules/.bin:$PATH
          hugo \
            --gc \
            --minify \
            --logLevel warning \
            --baseURL "https://detroitautomationacademy.com/blog/" \
            --destination "../public-blog"
          echo "Hugo build complete."

      - name: Prepare Deployment Directory
        run: |
          echo "Preparing deployment directory..."
          mkdir -p deployment/blog

          # Copy root HTML files
          cp index.html deployment/          || echo "index.html not found"
          cp admin.html deployment/          || echo "admin.html not found"
          cp dashboard.html deployment/      || echo "dashboard.html not found"
          cp students.html deployment/       || echo "students.html not found"
          cp instructors.html deployment/    || echo "instructors.html not found"
          cp partners.html deployment/       || echo "partners.html not found"
          cp landing.html deployment/        || echo "landing.html not found"
          cp subscriptions.html deployment/  || echo "subscriptions.html not found"
          cp CNAME deployment/               || echo "CNAME not found"
          cp .nojekyll deployment/           || echo ".nojekyll not found"

          # Copy asset directories
          cp -r assets deployment/   || (mkdir -p deployment/assets   && echo "assets dir created empty")
          cp -r branding deployment/ || (mkdir -p deployment/branding && echo "branding dir created empty")
          cp -r qr_codes deployment/ || (mkdir -p deployment/qr_codes && echo "qr_codes dir created empty")

          # Copy blog content (Hugo built output)
          if [ -d "public-blog" ]; then
            cp -r public-blog/* deployment/blog/
          else
            echo "FATAL: public-blog directory not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deployment

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
