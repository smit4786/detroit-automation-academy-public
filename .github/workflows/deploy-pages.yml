name: Deploy Hugo site to gh-pages branch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: blog-source
        run: npm install

      - name: Build with Hugo
        working-directory: blog-source
        run: |
          echo "Building Hugo site..."
          export PATH=$PWD/node_modules/.bin:$PATH
          hugo \
            --gc \
            --minify \
            --logLevel warning \
            --baseURL "https://detroitautomationacademy.com/blog/" \
            --destination "../public-blog"
          echo "Hugo build complete."
          ls ../public-blog

      - name: Prepare Deployment Directory
        run: |
          echo "Preparing deployment directory..."
          mkdir -p deployment/blog

          # Copy root HTML files
          cp index.html deployment/          || echo "index.html not found"
          cp dashboard.html deployment/      || echo "dashboard.html not found"
          cp students.html deployment/       || echo "students.html not found"
          cp instructors.html deployment/    || echo "instructors.html not found"
          cp partners.html deployment/       || echo "partners.html not found"
          cp landing.html deployment/        || echo "landing.html not found"
          cp subscriptions.html deployment/  || echo "subscriptions.html not found"
          cp CNAME deployment/               || echo "CNAME not found"
          cp .nojekyll deployment/           || echo ".nojekyll not found"

          # Copy asset directories
          cp -r assets deployment/   || (mkdir -p deployment/assets   && echo "assets dir created empty")
          cp -r branding deployment/ || (mkdir -p deployment/branding && echo "branding dir created empty")
          cp -r qr_codes deployment/ || (mkdir -p deployment/qr_codes && echo "qr_codes dir created empty")

          # Copy blog content (Hugo built output)
          if [ -d "public-blog" ]; then
            cp -r public-blog/* deployment/blog/
          else
            echo "FATAL: public-blog directory not found!"
            exit 1
          fi

          echo "Deployment directory prepared."
          ls deployment/

      - name: QA Gate - Pre-Deploy Validation
        run: |
          echo "=== QA Gate: Pre-Deploy Validation ==="
          FAIL=0

          # 1. Verify deployment directory exists and is non-empty
          if [ ! -d "deployment" ] || [ -z "$(ls -A deployment)" ]; then
            echo "FATAL: Deployment directory is missing or empty"
            FAIL=1
          fi

          # 2. Verify critical HTML pages exist
          for page in index.html partners.html students.html; do
            if [ ! -f "deployment/$page" ]; then
              echo "FATAL: Missing critical page: $page"
              FAIL=1
            fi
          done

          # 3. Verify blog output
          if [ ! -f "deployment/blog/index.html" ]; then
            echo "FATAL: Blog index.html missing from deployment"
            FAIL=1
          fi

          # 4. Scan for banned content
          BANNED_TERMS="501(c)(3)|nonprofit|non-profit"
          if grep -riE "$BANNED_TERMS" deployment/*.html 2>/dev/null; then
            echo "FATAL: Banned content detected in HTML files (non-profit claims)"
            FAIL=1
          fi

          # 5. Check for empty HTML files
          EMPTY_FILES=$(find deployment/ -name "*.html" -empty)
          if [ -n "$EMPTY_FILES" ]; then
            echo "FATAL: Empty HTML files detected:"
            echo "$EMPTY_FILES"
            FAIL=1
          fi

          if [ $FAIL -ne 0 ]; then
            echo "❌ QA Gate FAILED — deployment blocked"
            exit 1
          fi

          echo "✅ QA Gate passed — all checks clean"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deployment
          publish_branch: gh-pages
          cname: detroitautomationacademy.com
          force_orphan: true
