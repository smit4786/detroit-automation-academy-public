# C:\Users\dbkr\workspace\daa-public-staging\blog-source\hugo.toml
# Status: 🟢 ACTIVE | Sprint: 1012 | Last Revised: 2026-04-16
# Owner: @CTO-Agent | Project: DAA Infinite Synthesis

baseURL = 'https://blog.detroitautomationacademy.com'
title = "Automated Insights"
theme = 'ananke'
publishDir = '../blog'

defaultContentLanguage = 'en'

[languages]
  [languages.en]
    contentDir = 'content/en'
    languageName = 'English'
    weight = 1
  [languages.de]
    contentDir = 'content/de'
    languageName = 'Deutsch'
    weight = 2
  [languages.ru]
    contentDir = 'content/ru'
    languageName = 'Ruсский'
    weight = 3

[params]
  author = "Justin Smith"
  show_reading_time = true
  recent_posts_number = 5
  # DAA dark brand alignment
  background_color_class = "bg-near-black"
  body_classes = "avenir bg-near-black near-white"
  post_content_classes = "avenir"
  cover_dimming_class = "black-50"
  custom_css = ["../../branding/palette.css", "custom.css"]

[params.social]
  github = "https://github.com/AutomatedTechnologies"

# ── Navigation ───────────────────────────────────────────────────────────────
[[menus.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 5

[[menus.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menus.main]]
  identifier = "status"
  name = "Status"
  url = "/status/"
  weight = 15

[[menus.main]]
  identifier = "daa"
  name = "← Detroit Automation Academy"
  url = "https://detroitautomationacademy.com"
  weight = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
