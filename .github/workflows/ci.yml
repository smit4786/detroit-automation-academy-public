name: DAA Public CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-lint-and-format:
    runs-on: ubuntu-latest
    name: Python Lint & Format

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 bandit

      - name: Check code formatting with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 --max-line-length=88 --extend-ignore=E203,W503 --exclude=node_modules,.git,__pycache__,venv,blog-source/themes .

      - name: Security scan with Bandit
        run: bandit -r . -x ./venv -q

  go-backend-check:
    runs-on: ubuntu-latest
    name: Go Backend Build & Lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Placeholder for consistency if needed, but we'll use setup-go

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: crm/backend/go.sum

      - name: Build Backend
        working-directory: crm/backend
        run: go build -v ./...

  hugo-frontend-check:
    runs-on: ubuntu-latest
    name: Hugo Frontend Build Check

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: blog-source
        run: npm install

      - name: Hugo Build Check
        working-directory: blog-source
        run: hugo --gc --minify

  documentation:
    runs-on: ubuntu-latest
    name: Documentation Validation

    steps:
      - uses: actions/checkout@v4

      - name: Check required documentation
        run: |
          required_files=("README.md" "LICENSE")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required documentation: $file"
              exit 1
            fi
          done
          echo "✓ All required documentation present"
