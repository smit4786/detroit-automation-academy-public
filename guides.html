<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="branding/palette.css">
    <style>
        body { background-color: var(--daa-bg); color: var(--daa-fg); font-family: 'Inter', sans-serif; line-height: 1.6; margin: 0; }
        .container { max-width: 900px; margin: 4rem auto; padding: 2rem; background: var(--daa-bg-card); border: 1px solid var(--daa-border); border-radius: 20px; box-shadow: var(--daa-shadow-blue); }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; color: var(--daa-primary); }
        .guide-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .guide-card { padding: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid var(--daa-border); border-radius: 12px; transition: 0.3s; }
        .guide-card:hover { border-color: var(--daa-accent); box-shadow: var(--daa-shadow-blue); transform: translateY(-5px); }
        .back-link { color: var(--daa-accent); text-decoration: none; font-weight: 600; }
    </style>
</head>

            </div>
        </div>
    </div>
